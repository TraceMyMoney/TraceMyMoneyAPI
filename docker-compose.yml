version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: stalkmymoney_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: stalk_my_money
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  api:
    build: .
    container_name: stalkmymoney_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=stalk_my_money
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
