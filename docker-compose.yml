version: "3.8"

services:
  # TODO: remove this trackmoney_api from nginx container
  trackmoney_api:
    image: parimalmahindrakar/smm-image
    container_name: stalkmymoney_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../env/.env.prod
    networks:
      - app-network

    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload

  rabbitmq:
    image: "rabbitmq:3-management"
    hostname: "rabbitmq"
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: parimalmahindrakar/tracemymoney_nginx:latest
    container_name: tm_nginx_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/etc/ssl/certs/tm_keys:/etc/ssl/certs/tm_keys"
      - "/etc/ssl/certs/rm_keys:/etc/ssl/certs/rm_keys"
    depends_on:
      - trackmoney_api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
